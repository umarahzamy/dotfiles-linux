# Change prefix from Ctrl-b to Ctrl-;
unbind C-b
set -g prefix C-\;
bind C-\; send-prefix

set -g allow-passthrough on
set -g status-position top
set -g mode-keys vi
set -g mouse on

# Fix Home/End keys for neovim
set -g default-terminal "tmux-256color"

# Enable extended key sequences (CSI u) so modifier+Enter/arrows are distinct
# Without this, tmux collapses Shift+Enter → plain Enter (\r)
set -g extended-keys on
set -g extended-keys-format csi-u
# Without this, tmux strips true-color escape sequences — TUI apps like yazi lose their hex color themes
set -as terminal-features ",foot*:RGB"

set -g @plugin 'tmux-plugins/tpm'

# Split pane shortcuts using two-key combinations
# Create a new key table 'w' for window operations
bind w switch-client -T wtable
bind -T wtable v split-window -h -c "#{pane_current_path}"
bind -T wtable h split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation with prefix w + hjkl
bind -T wtable h select-pane -L
bind -T wtable j select-pane -D
bind -T wtable k select-pane -U
bind -T wtable l select-pane -R

# Optional: Keep the default splits with more intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind c new-window -a -c "$HOME"

unbind &
bind & kill-window
# Move current window one position to the left (wrap-around)
# If current index is 0 -> swap to last index, otherwise swap with -1
bind b run-shell 'if [ "#{window_index}" -eq 0 ]; then tmux swap-window -t $((#{session_windows} - 1)); else tmux swap-window -t -1; fi; tmux display-message "swapped window"'

# Move current window one position to the right (wrap-around)
# If current index is last -> swap to 0, otherwise swap with +1
bind f run-shell 'if [ "#{window_index}" -eq "$((#{session_windows} - 1))" ]; then tmux swap-window -t 0; else tmux swap-window -t +1; fi; tmux display-message "swapped window"'

set -g status-style "bg=default"
set -g status-right ""
set -g window-status-format " #{pane_title} "
set -g window-status-current-format " #{pane_title} "
set -g window-status-current-style fg=black,bg=white,bold

# Initialize TMUX plugin manager (keep this first)
run '~/.tmux/plugins/tpm/tpm'


